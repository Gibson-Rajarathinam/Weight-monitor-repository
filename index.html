<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Monitor - ESP8266 Data Logger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Weight Monitor</h1>
        </header>

        <div class="controls">
            <button id="startBtn">Start</button>
            <button id="stopBtn">Stop</button>
            <button id="clearCardsBtn">Clear Cards</button>
            <button id="clearBtn">Clear Logs</button>
        </div>

        <div class="data-container" id="dataContainer">
            <!-- Data will be displayed here -->
        </div>

        <div class="logs-section">
            <h2>Logged Data</h2>
            <div class="logs" id="logsList">
                <p>No data logged yet</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
